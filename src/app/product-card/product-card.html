<div class="product-card" [ngStyle]="{'border-color': product.stockCount < 10 ? 'red' : 'green'}">
  <img [src]="product.imageUrl" [alt]="product.name" class="product-image">
  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>
    <p class="price">{{ product.price | currencyFormatter:'INR':'en-IN' }}</p>
    <p class="stock">Stock: {{ product.stockCount }}</p>
    <p class="added-date">Added: {{ product.addedDate | timeAgo }}</p>
    <app-star-rating 
      [rating]="product.rating" 
      (ratingChange)="onRatingChange($event)">
    </app-star-rating>
  </div>
</div>
